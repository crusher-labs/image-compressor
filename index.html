<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .ic-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 42rem; margin-inline: auto; }
        .ic-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-4); }
        input[type="file"].crusher-tool-control { padding: var(--crusher-spacing-2); }
        .ic-preview-wrap { display: flex; justify-content: center; }
        .ic-preview {
            max-block-size: 16rem;
            max-inline-size: 100%;
            border-radius: var(--crusher-radius-lg);
            box-shadow: var(--crusher-shadow-lg);
            display: none;
        }
        .ic-preview[data-visible="true"] { display: block; }
        .ic-label { display: block; margin-bottom: var(--crusher-spacing-1); font-size: var(--crusher-font-size-sm); color: var(--crusher-text-secondary); }
        .ic-range { width: 100%; accent-color: var(--crusher-color-brand-primary); }
        .ic-actions { display: flex; flex-wrap: wrap; gap: var(--crusher-spacing-3); justify-content: center; }
        .ic-action {
            padding-inline: var(--crusher-spacing-6); padding-block: var(--crusher-spacing-2);
            border-radius: var(--crusher-radius-full); font-weight: 600;
        }
        .ic-action[disabled] { opacity: 0.5; cursor: not-allowed; }
        .ic-stats {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--crusher-font-size-sm);
            color: var(--crusher-text-secondary);
        }
        .ic-canvas-hidden { display: none; }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Image Compressor</h1>
            <p class="crusher-tool-lede">Client-side image compression.</p>
        </header>

        <div class="ic-stack">
            <section class="crusher-tool-surface ic-section">
                <div>
                    <label for="file-input" class="ic-label">Select Image</label>
                    <input type="file" id="file-input" accept="image/*" class="crusher-tool-control">
                </div>

                <div class="ic-preview-wrap">
                    <img id="preview" class="ic-preview" alt="">
                </div>

                <div>
                    <label for="quality" class="ic-label">Quality: <span id="q-val">0.8</span></label>
                    <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8" class="ic-range">
                </div>

                <div class="ic-actions">
                    <button id="compress-btn" type="button" class="crusher-tool-action ic-action" disabled>Compress</button>
                    <button id="download-btn" type="button" class="crusher-tool-action ic-action" disabled>Download</button>
                </div>

                <p id="stats" class="ic-stats"></p>
            </section>
        </div>
    </main>

    <canvas id="canvas" class="ic-canvas-hidden"></canvas>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color></crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js"></script>

    <script>
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const canvas = document.getElementById('canvas');
        const qualityInput = document.getElementById('quality');
        const qValEl = document.getElementById('q-val');
        const compressBtn = document.getElementById('compress-btn');
        const downloadBtn = document.getElementById('download-btn');
        const statsEl = document.getElementById('stats');

        let currentFile = null;

        qualityInput.addEventListener('input', () => {
            qValEl.textContent = qualityInput.value;
        });

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.dataset.visible = 'true';
                compressBtn.disabled = false;
            };
            reader.readAsDataURL(currentFile);
        });

        compressBtn.addEventListener('click', () => {
            if (!preview.src) return;
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                canvas.toBlob((blob) => {
                    if (!blob) return;
                    const url = URL.createObjectURL(blob);
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'compressed.jpg';
                        a.click();
                    };
                    downloadBtn.disabled = false;
                    statsEl.textContent = `Original: ${(currentFile.size / 1024).toFixed(1)}KB → Compressed: ${(blob.size / 1024).toFixed(1)}KB`;
                }, 'image/jpeg', parseFloat(qualityInput.value));
            };
            img.src = preview.src;
        });
    </script>
</body>
</html>
